name: Build Windows Installer

# When does this run?
#   - Every push to the main branch
#   - Whenever you click "Run workflow" in the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + Tauri CLI
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/bin
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 1.6.5 --locked

      - name: Install backend (with PyInstaller)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install --no-fund --no-audit
          npm run build

      - name: Build Python sidecar with PyInstaller
        working-directory: backend
        run: |
          python -m PyInstaller `
            --onefile --noconfirm --console `
            --name nhlsb-server-x86_64-pc-windows-msvc `
            --collect-all fastapi `
            --collect-all uvicorn `
            --collect-all pydantic `
            --collect-all PIL `
            --hidden-import nhlsb `
            --hidden-import nhlsb.core `
            --hidden-import nhlsb.api `
            --hidden-import nhlsb.runtime `
            --hidden-import nhlsb.project `
            --add-data "..\assets;assets" `
            --add-data "..\frontend\dist;frontend_dist" `
            src\nhlsb\__main__.py
          New-Item -ItemType Directory -Force -Path ..\desktop\src-tauri\binaries
          Copy-Item dist\nhlsb-server-x86_64-pc-windows-msvc.exe ..\desktop\src-tauri\binaries\

      - name: Build Tauri installer (.msi)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload .msi as downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: NHL-Scoreboard-Studio-Installer
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90

      - name: Upload .exe (NSIS) as well
        uses: actions/upload-artifact@v4
        with:
          name: NHL-Scoreboard-Studio-Installer-NSIS
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
