name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          shared-key: tauri-build
          cache-on-failure: true

      - name: Cache Tauri CLI binary
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: ${{ runner.os }}-tauri-cli-1.6.5

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version 1.6.5 --locked

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            backend/build
            backend/.venv
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('backend/pyproject.toml', 'backend/src/**/*.py') }}
          restore-keys: ${{ runner.os }}-pyinstaller-

      - name: Install backend (with PyInstaller)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --no-fund --no-audit
          npm run build

      - name: Build Python sidecar with PyInstaller
        working-directory: backend
        run: |
          python -m PyInstaller `
            --onefile --noconfirm --console `
            --name nhlsb-server-x86_64-pc-windows-msvc `
            --collect-all fastapi `
            --collect-all uvicorn `
            --collect-all pydantic `
            --collect-all PIL `
            --hidden-import nhlsb `
            --hidden-import nhlsb.core `
            --hidden-import nhlsb.api `
            --hidden-import nhlsb.runtime `
            --hidden-import nhlsb.project `
            --add-data "..\assets;assets" `
            --add-data "..\frontend\dist;frontend_dist" `
            src\nhlsb\__main__.py
          New-Item -ItemType Directory -Force -Path ..\desktop\src-tauri\binaries
          Copy-Item dist\nhlsb-server-x86_64-pc-windows-msvc.exe ..\desktop\src-tauri\binaries\

      - name: Build Tauri installer (NSIS)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: NHL-Scoreboard-Studio-Installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 90
